<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="мавр — навигатор по проектам">
    <meta name="keywords" content="мавр, проекты, утилиты, роутинг, telegram">
    <meta name="author" content="мавр">
    
    <title>мавр</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-bg: #000000; --color-text: #F5F5F5;
            --color-cyan: #00D1FF; --color-lime: #CCFF00; --color-purple: #BB00FF;
            --grid-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; min-height: 100%; background-color: var(--color-bg); color: var(--color-text); font-family: 'Inter', sans-serif; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }

        /* ФОН И СФЕРЫ ДЛЯ СТЕКЛА */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden; }
        
        .ambient-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.5; animation: float 12s infinite alternate ease-in-out; }
        .blob-1 { width: 50vw; height: 50vw; background: var(--color-purple); top: -10%; left: -10%; }
        .blob-2 { width: 40vw; height: 40vw; background: var(--color-cyan); bottom: 10%; right: -10%; animation-delay: -3s; }
        .blob-3 { width: 30vw; height: 30vw; background: var(--color-lime); top: 40%; left: 30%; animation-delay: -7s; opacity: 0.3; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(15vw, 15vh) scale(1.2); } }

        /* ИСПРАВЛЕННАЯ СЕТКА */
        .grid-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50vh;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px; background-position: center bottom;
            transform-origin: top center; transform: perspective(400px) rotateX(70deg); 
            animation: gridMove 2s linear infinite;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 40%, rgba(0,0,0,1) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 40%, rgba(0,0,0,1) 100%);
        }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 40px; } }

        .subtle-noise { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)" opacity="0.05"/%3E%3C/svg%3E'); opacity: 0.9; }

        .main-stage { position: relative; z-index: 10; width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 8vh 24px 80px 24px; }

        /* ЛОГОТИП МАВР */
        .brand-logo { width: clamp(90px, 20vw, 120px); height: auto; margin-bottom: 48px; filter: drop-shadow(0 0 20px rgba(204, 255, 0, 0.15)); transition: filter 0.4s ease; cursor: pointer; }
        .brand-logo:hover { filter: drop-shadow(0 0 30px rgba(204, 255, 0, 0.4)); }
        .brand-logo .glitch-layer-1, .brand-logo .glitch-layer-2 { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: center; }
        .brand-logo:hover .glitch-layer-1 { transform: translate(-4px, 4px); }
        .brand-logo:hover .glitch-layer-2 { transform: translate(4px, -4px); }

        .glitch-title { font-family: 'Unbounded', sans-serif; font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; text-transform: lowercase; color: var(--color-text); line-height: 1; text-align: center; text-shadow: 0 0 20px rgba(255, 255, 255, 0.2); white-space: nowrap; letter-spacing: 2px; margin-bottom: 48px; }

        /* СЕТКА ПРОЕКТОВ */
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%; max-width: 560px; }
        .card-full { grid-column: span 2; }

        /* КАРТОЧКА СО СТЕКЛОМ */
        .bento-card {
            position: relative; display: flex; flex-direction: column; justify-content: space-between;
            padding: 24px; text-decoration: none; border-radius: 28px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15); border-left: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); overflow: hidden; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); min-height: 120px;
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }
        .card-title { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 900; color: var(--color-text); letter-spacing: 0.5px; transition: color 0.4s ease; text-transform: lowercase; }
        .card-desc { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: rgba(255, 255, 255, 0.5); margin-top: auto; padding-top: 24px; text-transform: lowercase; }

        .arrow-wrapper { position: relative; width: 24px; height: 24px; overflow: hidden; border-radius: 50%; background: rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; transition: background 0.4s ease; }
        .arrow-icon { position: absolute; width: 14px; height: 14px; fill: rgba(255, 255, 255, 0.8); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), fill 0.4s ease; }
        .arrow-main { transform: translate(0, 0); }
        .arrow-hover { transform: translate(-20px, 20px); }

        .bento-card:hover { transform: translateY(-4px) scale(1.01); background: rgba(255, 255, 255, 0.08); }
        .bento-card:active { transform: translateY(1px) scale(0.98); }
        .bento-card:hover .arrow-main { transform: translate(20px, -20px); }
        .bento-card:hover .arrow-hover { transform: translate(0, 0); }

        .card-koridor:hover { border-color: rgba(0, 209, 255, 0.3); box-shadow: 0 15px 35px rgba(0, 209, 255, 0.15); }
        .card-koridor:hover .card-title { color: var(--color-cyan); }
        .card-koridor:hover .arrow-wrapper { background: rgba(0, 209, 255, 0.2); }
        .card-koridor:hover .arrow-icon { fill: var(--color-cyan); }

        .card-splitter:hover { border-color: rgba(204, 255, 0, 0.3); box-shadow: 0 15px 35px rgba(204, 255, 0, 0.1); }
        .card-splitter:hover .card-title { color: var(--color-lime); }
        .card-splitter:hover .arrow-wrapper { background: rgba(204, 255, 0, 0.2); }
        .card-splitter:hover .arrow-icon { fill: var(--color-lime); }

        .card-converter:hover { border-color: rgba(187, 0, 255, 0.3); box-shadow: 0 15px 35px rgba(187, 0, 255, 0.15); }
        .card-converter:hover .card-title { color: var(--color-purple); }
        .card-converter:hover .arrow-wrapper { background: rgba(187, 0, 255, 0.2); }
        .card-converter:hover .arrow-icon { fill: var(--color-purple); }

        .card-social:hover { border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 15px 35px rgba(255, 255, 255, 0.1); }
        .card-social:hover .card-title { color: #FFF; text-shadow: 0 0 10px rgba(255,255,255,0.4); }
        .card-social:hover .arrow-wrapper { background: rgba(255, 255, 255, 0.2); }
        .card-social:hover .arrow-icon { fill: #FFF; }

        @media (max-width: 480px) { .bento-grid { grid-template-columns: 1fr; } .card-full { grid-column: span 1; } }
    </style>
</head>
<body>
